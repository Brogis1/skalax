name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      - name: Install skalax with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          # microsoft-skala provides the PyTorch reference used in the
          # equivalence tests. Install without its deps to avoid pulling
          # in a torch build we don't control.
          pip install --no-deps microsoft-skala

      - name: Lint
        run: ruff check skalax/

      - name: Run pytest
        run: pytest tests/ -q
